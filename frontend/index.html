<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autonomous Agent Auction — SuperRare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #fff; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; }

.nav { display: flex; align-items: center; height: 52px; padding: 0 24px; background: #1a1a1a; border-bottom: 1px solid #252525; flex-shrink: 0; }
.nav-logo svg { height: 18px; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.cycle-badge { font-size: 10px; color: #666; background: #222; border: 1px solid #2a2a2a; border-radius: 10px; padding: 3px 10px; }
.cycle-badge .num { color: #aaa; font-weight: 600; }
.pulse { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #4ECDC4; margin-right: 5px; animation: blink 2s infinite; }
.pulse.off { background: #333; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.nav-link { width: 28px; height: 28px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; text-decoration: none; }
.nav-link svg { width: 13px; height: 13px; stroke: #888; fill: none; stroke-width: 2; }
.nav-link:hover svg { stroke: #fff; }

.main { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 52px); }

.art-col { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.artifact {
  width: 55%; max-width: 380px;
  aspect-ratio: 768 / 987;
  background: #141414;
  position: relative;
  transition: background-color 1.5s ease;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.slot {
  position: absolute;
  width: 12.1%; height: 8.3%; left: 43.9%;
  background: rgba(255,255,255,0.015);
  transition: background-color 1.5s ease;
}
.slot1 { top: 19.3%; }
.slot2 { top: 33.0%; }
.slot3 { top: 48.3%; }

.slot-labels {
  display: flex; gap: 16px; margin-top: 16px; font-size: 10px; color: #333;
}
.slot-label { display: flex; align-items: center; gap: 5px; }
.slot-swatch { width: 10px; height: 10px; border: 1px solid #333; transition: all 1s; }
.slot-swatch.set { border-color: transparent; }
.slot-by { color: #444; font-size: 9px; }

.det-col { overflow: hidden; border-left: 1px solid #252525; display: flex; flex-direction: column; }

.det-top { padding: 20px 20px 0; flex-shrink: 0; }
.title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 11px; color: #555; margin-bottom: 12px; line-height: 1.4; }

.stats { display: flex; gap: 6px; padding: 0 20px 12px; flex-shrink: 0; }
.stat { flex: 1; background: #1f1f1f; border-radius: 4px; padding: 8px; text-align: center; }
.stat .n { font-size: 16px; font-weight: 700; display: block; }
.stat .l { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }

.tabs { display: flex; border-bottom: 1px solid #252525; padding: 0 20px; flex-shrink: 0; }
.tab { font-size: 12px; font-weight: 500; padding: 10px 0; margin-right: 20px; cursor: pointer; color: #444; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #fff; }
.tab .cnt { color: #333; font-size: 10px; margin-left: 3px; }

.tab-body { flex: 1; overflow-y: auto; }

#detailsContent { padding: 14px 20px; }
.d-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; }
.d-row .l { color: #555; }
.d-row .v { color: #999; }
.d-row .v a { color: #888; text-decoration: none; }
.d-row .v a:hover { color: #fff; }
.links { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.link-btn { padding: 5px 10px; border: 1px solid #252525; border-radius: 12px; font-size: 10px; color: #666; text-decoration: none; transition: border-color 0.2s; }
.link-btn:hover { border-color: #555; color: #ccc; }
.capsule-block { background: #111; border: 1px solid #1f1f1f; border-radius: 4px; padding: 12px; font-family: monospace; font-size: 9px; color: #FFD93D; white-space: pre-wrap; max-height: 140px; overflow-y: auto; line-height: 1.5; display: none; margin-top: 12px; }

#activityContent { display: none; }
#activityContent.show { display: block; }
.bid-row { display: flex; align-items: center; gap: 10px; padding: 8px 20px; border-bottom: 1px solid #1a1a1a; font-size: 11px; }
.bid-row:hover { background: rgba(255,255,255,0.01); }
.bid-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
.bid-info { flex: 1; color: #888; }
.bid-info strong { color: #ccc; font-weight: 600; }
.bid-info .slot-tag { color: #555; }
.bid-time { color: #333; font-size: 10px; flex-shrink: 0; }
.bid-empty { color: #333; font-size: 11px; padding: 32px 20px; text-align: center; }

@media (max-width: 900px) {
  body { overflow: auto; height: auto; }
  .main { grid-template-columns: 1fr; height: auto; }
  .art-col { min-height: 50vh; padding: 24px; }
  .det-col { border-left: none; border-top: 1px solid #252525; height: 50vh; }
}
</style>

<script>
let lastEvtCount = 0;

function render(state) {
  document.getElementById('cycleNum').textContent = state.cycle_count || '—';

  const auctions = state.auctions || [];
  const capsules = state.capsules || [];
  const events = state.events || [];
  const active = auctions.filter(a => a.state === 'RUNNING');
  const settled = auctions.filter(a => a.state === 'SETTLED');
  let minted = 0;
  for (const a of Object.values(state.agents || {})) minted += (a.minted_tokens || []).length;
  let totalBids = 0;
  auctions.forEach(a => totalBids += (a.bid_history || a.bids || []).length);

  document.getElementById('nMinted').textContent = minted || '—';
  document.getElementById('nBids').textContent = totalBids || '—';
  document.getElementById('nSettled').textContent = settled.length || '—';
  document.getElementById('auctionStatus').textContent = active.length ? 'Live' : settled.length ? 'Settled' : '—';

  // Artwork
  const latest = active[0] || auctions[auctions.length - 1];
  const art = document.getElementById('artifact');
  if (latest) {
    art.style.backgroundColor = latest.bg_color || '#141414';
    const slots = latest.slots || {};
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('slot' + i);
      const sw = document.getElementById('sw' + i);
      const by = document.getElementById('by' + i);
      const color = slots[String(i)];
      if (color) {
        el.style.backgroundColor = color;
        sw.style.backgroundColor = color;
        sw.className = 'slot-swatch set';
        // Find who set it
        const hist = latest.bid_history || [];
        const last = [...hist].reverse().find(b => b.slot === i);
        by.textContent = last ? last.bidder_name : '';
      } else {
        el.style.backgroundColor = 'rgba(255,255,255,0.015)';
        sw.style.backgroundColor = '#222';
        sw.className = 'slot-swatch';
        by.textContent = '';
      }
    }
    document.getElementById('pageTitle').textContent = latest.token_id ? `Canvas #${latest.token_id}` : 'Autonomous Agent Auction';
  }

  // Capsule
  if (capsules.length) {
    const cap = capsules[capsules.length - 1];
    const block = document.getElementById('capBlock');
    block.textContent = JSON.stringify(cap, null, 2);
    block.style.display = 'block';
  }

  // Activity feed
  if (events.length > lastEvtCount || lastEvtCount === 0) {
    const feed = document.getElementById('bidFeed');
    const toAdd = lastEvtCount === 0 ? events.slice(-30) : events.slice(lastEvtCount);
    if (toAdd.length) document.getElementById('bidEmpty').style.display = 'none';
    for (const evt of toAdd.reverse()) {
      const action = (evt.action || '').toLowerCase();
      const detail = evt.detail || '';
      const ts = evt.ts ? new Date(evt.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';

      // Extract color from bid events
      let swatchColor = '#333';
      let text = detail;
      const colorMatch = detail.match(/#[0-9a-fA-F]{6}/);
      if (colorMatch) swatchColor = colorMatch[0];

      if (action === 'bid') {
        text = detail;
      } else if (action === 'minted') {
        swatchColor = detail.match(/#[0-9a-fA-F]{6}/)?.[0] || '#7B61FF';
        text = detail;
      } else if (action === 'listed') {
        swatchColor = '#FFD93D';
      } else if (action === 'settled') {
        swatchColor = '#4ECDC4';
      }

      feed.insertAdjacentHTML('afterbegin',
        `<div class="bid-row"><div class="bid-swatch" style="background:${swatchColor}"></div><div class="bid-info">${esc(text)}</div><div class="bid-time">${ts}</div></div>`
      );
    }
    lastEvtCount = events.length;
    document.getElementById('actCnt').textContent = events.length ? ` (${events.length})` : '';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  if (t === 'details') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('detailsContent').style.display = 'block';
    document.getElementById('activityContent').classList.remove('show');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('detailsContent').style.display = 'none';
    document.getElementById('activityContent').classList.add('show');
  }
}

async function poll() {
  if (demoMode) return;
  try { const r = await fetch('/api/state'); if (r.ok) render(await r.json()); } catch(e) {}
}

/* ─── Demo Mode ─── */
let demoMode = false;
let demoTimer = null;
const BIDDERS = [
  { id: 'alpha', name: 'Alpha', prefs: ['#FF6B6B','#FF3B30','#E74C3C'], slot: 1 },
  { id: 'beta',  name: 'Beta',  prefs: ['#4ECDC4','#00C98D','#1ABC9C'], slot: 2 },
  { id: 'gamma', name: 'Gamma', prefs: ['#FFD93D','#FF8C42','#F39C12'], slot: 3 },
];
const DEMO_BGS = ['#0D0D0D','#1A0A2E','#0A1628','#1C1C1C','#0A0A14','#12000A'];

function jitter(hex) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255, r + Math.floor(Math.random()*40-20)));
  g = Math.max(0,Math.min(255, g + Math.floor(Math.random()*30-15)));
  b = Math.max(0,Math.min(255, b + Math.floor(Math.random()*30-15)));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function toggleDemo() {
  demoMode = !demoMode;
  const btn = document.getElementById('demoBtn');
  if (demoMode) {
    btn.textContent = 'Stop Demo';
    btn.style.borderColor = '#FF6B6B';
    btn.style.color = '#FF6B6B';
    runDemo();
  } else {
    btn.textContent = 'Demo Mode';
    btn.style.borderColor = '#333';
    btn.style.color = '#666';
    if (demoTimer) clearTimeout(demoTimer);
  }
}

function runDemo() {
  if (!demoMode) return;
  lastEvtCount = 0;
  const bg = DEMO_BGS[Math.floor(Math.random()*DEMO_BGS.length)];
  const tokenId = Math.floor(Math.random()*900)+100;
  const events = [];
  const slots = { '1': null, '2': null, '3': null };
  const bidHistory = [];
  let t = Date.now();
  let bidCount = 0;
  let price = 0.0001;

  // Phase 1: Mint
  events.push({ ts: new Date(t).toISOString(), agent: '◈ artist', action: 'minted', detail: `Canvas #${tokenId} — background ${bg}` });
  t += 2000;

  // Phase 2: List
  events.push({ ts: new Date(t).toISOString(), agent: '◎ auctioneer', action: 'listed', detail: `Canvas #${tokenId} at ${price} ETH` });
  t += 3000;

  // Phase 3: Bids — staggered
  const shuffled = [...BIDDERS].sort(() => Math.random() - 0.5);
  for (const bidder of shuffled) {
    const color = jitter(bidder.prefs[Math.floor(Math.random()*bidder.prefs.length)]);
    price = Math.round(price * (1.1 + Math.random()*0.3) * 100000) / 100000;
    slots[String(bidder.slot)] = color;
    bidHistory.push({ bidder_id: bidder.id, bidder_name: bidder.name, slot: bidder.slot, color, amount: price, ts: new Date(t).toISOString() });
    events.push({ ts: new Date(t).toISOString(), agent: `⟡ ${bidder.name}`, action: 'bid', detail: `${bidder.name} set slot ${bidder.slot} to ${color} (${price} ETH)` });
    bidCount++;
    t += 2500 + Math.random() * 2000;
  }

  // Maybe a second round of bids
  if (Math.random() > 0.3) {
    const extra = shuffled[Math.floor(Math.random()*shuffled.length)];
    const color2 = jitter(extra.prefs[Math.floor(Math.random()*extra.prefs.length)]);
    price = Math.round(price * 1.15 * 100000) / 100000;
    slots[String(extra.slot)] = color2;
    bidHistory.push({ bidder_id: extra.id, bidder_name: extra.name, slot: extra.slot, color: color2, amount: price, ts: new Date(t).toISOString() });
    events.push({ ts: new Date(t).toISOString(), agent: `⟡ ${extra.name}`, action: 'bid', detail: `${extra.name} changed slot ${extra.slot} to ${color2} (${price} ETH)` });
    bidCount++;
    t += 3000;
  }

  // Phase 4: Settle
  events.push({ ts: new Date(t).toISOString(), agent: '◎ auctioneer', action: 'settled', detail: `Canvas #${tokenId} — ${bidCount} bids — capsule emitted` });

  const capsule = {
    type: 'auction_capsule', canvas: tokenId, bg_color: bg,
    final_slots: slots, bid_count: bidCount, bid_history: bidHistory,
    contract: '0x2800...2774', chain: 'base',
    settled_at: new Date(t).toISOString(), protocol: 'RARE/SuperRare'
  };

  // Animate: reveal events one by one
  const demoState = {
    cycle_count: Math.floor(Math.random()*50)+1,
    agents: { '◈': { minted_tokens: [tokenId] } },
    auctions: [{ token_id: tokenId, state: 'RUNNING', bg_color: bg, slots: {'1':null,'2':null,'3':null}, bids: [], bid_history: [], starting_price: 0.0001 }],
    capsules: [],
    events: [],
  };

  let step = 0;
  function nextStep() {
    if (!demoMode || step >= events.length) {
      if (demoMode && step >= events.length) {
        // Mark settled, show capsule, then restart after pause
        demoState.auctions[0].state = 'SETTLED';
        demoState.capsules = [capsule];
        render(demoState);
        demoTimer = setTimeout(runDemo, 4000);
      }
      return;
    }
    const evt = events[step];
    demoState.events.push(evt);

    // Update artwork state progressively
    if (evt.action === 'bid') {
      const bi = bidHistory.find(b => b.ts === evt.ts);
      if (bi) {
        demoState.auctions[0].slots[String(bi.slot)] = bi.color;
        demoState.auctions[0].bids.push(bi);
        demoState.auctions[0].bid_history.push(bi);
      }
    }
    if (evt.action === 'minted') {
      demoState.nMinted = 1;
    }

    lastEvtCount = 0; // Force re-render of feed
    render(demoState);
    step++;
    demoTimer = setTimeout(nextStep, 1500 + Math.random() * 1500);
  }

  // Reset UI
  document.getElementById('bidFeed').innerHTML = '';
  document.getElementById('bidEmpty').style.display = 'none';
  lastEvtCount = 0;
  render(demoState);
  demoTimer = setTimeout(nextStep, 800);
}

// Init
poll();
setInterval(poll, 5000);
</script>
</body>
